schema_version: 1

context:
  name: PyPDFForm
  version: "4.8.4"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/chinapandaman/PyPDFForm/archive/v${{ version }}.tar.gz
  sha256: 5ff8961ba5c8a620af21f9935badf4866c3a8c4c99dc9c1de8e9700b1c6d1125

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - cryptography >=47.0.0,<48.0.0
    - fonttools >=4.62.1,<5.0.0
    - pikepdf >=10.5.1,<11.0.0
    - pillow >=12.2.0,<13.0.0
    - pypdf >=6.10.1,<7.0.0
    - reportlab >=4.4.6,<5.0.0

tests:
  - python:
      imports:
        - PyPDFForm
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: The Python library for PDF forms.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/chinapandaman/PyPDFForm

extra:
  recipe-maintainers:
    - thewchan
